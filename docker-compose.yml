services:
  # ═══════════════════════════════════════════════════
  # Caddy — Reverse proxy + automatic HTTPS (Let's Encrypt)
  # No Docker socket required — routes defined in Caddyfile
  # ═══════════════════════════════════════════════════
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped

    ports:
      - "80:80"     # HTTP (Caddy auto-redirects to HTTPS)
      - "443:443"   # HTTPS

    environment:
      - MCP_HOSTNAME=${MCP_HOSTNAME}

    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # Persistent cert storage
      - caddy-config:/config   # Caddy config cache

    networks:
      - hudu-mcp-network

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═══════════════════════════════════════════════════
  # Hudu MCP Server
  # ═══════════════════════════════════════════════════
  hudu-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hudu-mcp-server
    restart: unless-stopped

    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Hudu API
      - HUDU_BASE_URL=${HUDU_BASE_URL}
      - HUDU_API_KEY=${HUDU_API_KEY}
      - HUDU_TIMEOUT=${HUDU_TIMEOUT:-30000}
      - HUDU_ALLOWED_COMPANY_IDS=${HUDU_ALLOWED_COMPANY_IDS:-ALL}
      # Server
      - MCP_SERVER_PORT=3100
      # OAuth 2.1 (for Claude.ai custom connectors)
      - MCP_OAUTH_ENABLED=${MCP_OAUTH_ENABLED:-false}
      - MCP_SERVER_URL=https://${MCP_HOSTNAME}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID}
      - AZURE_AUDIENCE=${AZURE_AUDIENCE}

    volumes:
      - ./logs:/app/logs

    networks:
      - hudu-mcp-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"

networks:
  hudu-mcp-network:
    driver: bridge
    name: hudu-mcp-network

volumes:
  caddy-data:
    name: caddy-data
  caddy-config:
    name: caddy-config
